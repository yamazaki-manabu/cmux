name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  workflow-guard-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate WarpBuild runner guards
        run: ./tests/test_ci_self_hosted_guard.sh

      - name: Validate create-dmg version pinning
        run: ./tests/test_ci_create_dmg_pinned.sh

      - name: Validate unit-test SwiftPM retry guard
        run: ./tests/test_ci_unit_test_spm_retry.sh

      - name: Validate cmux scheme test configuration
        run: ./tests/test_ci_scheme_testaction_debug.sh

      - name: Validate GhosttyKit checksum verification
        run: ./tests/test_ci_ghosttykit_checksum_verification.sh

      - name: Validate release asset guard
        run: node scripts/release_asset_guard.test.js

      - name: Validate current GhosttyKit checksum pin
        run: ./tests/test_ci_ghosttykit_checksum_present.sh

  remote-daemon-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: daemon/remote/go.mod

      - name: Run remote daemon tests
        working-directory: daemon/remote
        run: go test ./...

      - name: Validate remote daemon release assets
        run: ./tests/test_remote_daemon_release_assets.sh

  web-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun tsc --noEmit

  tests-shard-1:
    # Never run WarpBuild jobs for fork pull requests (avoid billing on external PRs).
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: warp-macos-15-arm64-6x
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - name: Run unit test shard
        uses: ./.github/actions/run-unit-test-shard
        with:
          shard_index: "0"
          shard_count: "6"
      - name: Run bundled Ghostty theme picker helper regression
        run: |
          set -euo pipefail
          CMUX_SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages" \
            ./tests/test_bundled_ghostty_theme_picker_helper.sh
      - name: Run CLI version memory guard regression
        run: |
          set -euo pipefail

          CLI_BIN="$(
            find "$HOME/Library/Developer/Xcode/DerivedData" -path "*/Build/Products/Debug/cmux" -exec stat -f '%m %N' {} \; \
              | sort -nr \
              | head -1 \
              | cut -d' ' -f2-
          )"
          if [ -z "${CLI_BIN:-}" ] || [ ! -x "$CLI_BIN" ]; then
            echo "cmux CLI binary not found in DerivedData" >&2
            exit 1
          fi

          CMUX_CLI_BIN="$CLI_BIN" python3 tests/test_cli_version_memory_guard.py

  tests-shard-2:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: warp-macos-15-arm64-6x
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - name: Run unit test shard
        uses: ./.github/actions/run-unit-test-shard
        with:
          shard_index: "1"
          shard_count: "6"

  tests-shard-3:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: warp-macos-15-arm64-6x
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - name: Run unit test shard
        uses: ./.github/actions/run-unit-test-shard
        with:
          shard_index: "2"
          shard_count: "6"

  tests-shard-4:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: warp-macos-15-arm64-6x
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - name: Run unit test shard
        uses: ./.github/actions/run-unit-test-shard
        with:
          shard_index: "3"
          shard_count: "6"

  tests-shard-5:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: warp-macos-15-arm64-6x
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - name: Run unit test shard
        uses: ./.github/actions/run-unit-test-shard
        with:
          shard_index: "4"
          shard_count: "6"

  tests-shard-6:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: warp-macos-15-arm64-6x
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - name: Run unit test shard
        uses: ./.github/actions/run-unit-test-shard
        with:
          shard_index: "5"
          shard_count: "6"

  tests:
    if: ${{ always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    needs:
      - tests-shard-1
      - tests-shard-2
      - tests-shard-3
      - tests-shard-4
      - tests-shard-5
      - tests-shard-6
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify unit test shards passed
        run: |
          set -euo pipefail

          SHARD_1_RESULT="${{ needs.tests-shard-1.result }}"
          SHARD_2_RESULT="${{ needs.tests-shard-2.result }}"
          SHARD_3_RESULT="${{ needs.tests-shard-3.result }}"
          SHARD_4_RESULT="${{ needs.tests-shard-4.result }}"
          SHARD_5_RESULT="${{ needs.tests-shard-5.result }}"
          SHARD_6_RESULT="${{ needs.tests-shard-6.result }}"

          if [ "$SHARD_1_RESULT" = "success" ] \
            && [ "$SHARD_2_RESULT" = "success" ] \
            && [ "$SHARD_3_RESULT" = "success" ] \
            && [ "$SHARD_4_RESULT" = "success" ] \
            && [ "$SHARD_5_RESULT" = "success" ] \
            && [ "$SHARD_6_RESULT" = "success" ]; then
            echo "All cmux-unit shards passed."
            exit 0
          fi

          echo "One or more cmux-unit shards failed." >&2
          echo "tests-shard-1=$SHARD_1_RESULT" >&2
          echo "tests-shard-2=$SHARD_2_RESULT" >&2
          echo "tests-shard-3=$SHARD_3_RESULT" >&2
          echo "tests-shard-4=$SHARD_4_RESULT" >&2
          echo "tests-shard-5=$SHARD_5_RESULT" >&2
          echo "tests-shard-6=$SHARD_6_RESULT" >&2
          exit 1

  tests-build-and-lag-attempt-1:
    # Build the full cmux scheme and run the lag regression on WarpBuild.
    # XCUITests cannot run on WarpBuild (Virtualization.framework limitation:
    # XCUIApplication stuck "Running Background", 62s activation timeout per
    # test). Interactive UI tests run via test-e2e.yml on GitHub-hosted runners.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    continue-on-error: true
    runs-on: warp-macos-15-arm64-6x
    timeout-minutes: 20
    outputs:
      test_started: ${{ steps.lag-regression.outputs.test_started }}
      passed: ${{ steps.lag-regression.outputs.passed }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - name: Run lag regression attempt
        id: lag-regression
        uses: ./.github/actions/run-lag-regression

  tests-build-and-lag-attempt-2:
    if: ${{ always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && needs.tests-build-and-lag-attempt-1.result == 'cancelled' && needs.tests-build-and-lag-attempt-1.outputs.test_started != 'true' }}
    needs:
      - tests-build-and-lag-attempt-1
    continue-on-error: true
    runs-on: warp-macos-15-arm64-6x
    timeout-minutes: 20
    outputs:
      test_started: ${{ steps.lag-regression.outputs.test_started }}
      passed: ${{ steps.lag-regression.outputs.passed }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - name: Run lag regression attempt
        id: lag-regression
        uses: ./.github/actions/run-lag-regression

  tests-build-and-lag:
    if: ${{ always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    needs:
      - tests-build-and-lag-attempt-1
      - tests-build-and-lag-attempt-2
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify lag regression result
        run: |
          set -euo pipefail

          ATTEMPT_1_RESULT="${{ needs.tests-build-and-lag-attempt-1.result }}"
          ATTEMPT_1_TEST_STARTED="${{ needs.tests-build-and-lag-attempt-1.outputs.test_started }}"
          ATTEMPT_1_PASSED="${{ needs.tests-build-and-lag-attempt-1.outputs.passed }}"
          ATTEMPT_2_RESULT="${{ needs.tests-build-and-lag-attempt-2.result }}"
          ATTEMPT_2_TEST_STARTED="${{ needs.tests-build-and-lag-attempt-2.outputs.test_started }}"
          ATTEMPT_2_PASSED="${{ needs.tests-build-and-lag-attempt-2.outputs.passed }}"

          if [ "$ATTEMPT_1_PASSED" = "true" ] || [ "$ATTEMPT_2_PASSED" = "true" ]; then
            echo "Lag regression passed."
            exit 0
          fi

          echo "Lag regression did not pass." >&2
          echo "Attempt 1: result=$ATTEMPT_1_RESULT, test_started=${ATTEMPT_1_TEST_STARTED:-<unset>}, passed=${ATTEMPT_1_PASSED:-<unset>}" >&2
          echo "Attempt 2: result=$ATTEMPT_2_RESULT, test_started=${ATTEMPT_2_TEST_STARTED:-<unset>}, passed=${ATTEMPT_2_PASSED:-<unset>}" >&2
          exit 1

  ui-display-resolution-regression-attempt-1:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    continue-on-error: true
    runs-on: warp-macos-15-arm64-6x
    timeout-minutes: 25
    outputs:
      test_started: ${{ steps.display-regression.outputs.test_started }}
      passed: ${{ steps.display-regression.outputs.passed }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - name: Run display regression attempt
        id: display-regression
        uses: ./.github/actions/run-display-resolution-regression

  ui-display-resolution-regression-attempt-2:
    if: ${{ always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && needs.ui-display-resolution-regression-attempt-1.result == 'cancelled' && needs.ui-display-resolution-regression-attempt-1.outputs.test_started != 'true' }}
    needs:
      - ui-display-resolution-regression-attempt-1
    continue-on-error: true
    runs-on: warp-macos-15-arm64-6x
    timeout-minutes: 25
    outputs:
      test_started: ${{ steps.display-regression.outputs.test_started }}
      passed: ${{ steps.display-regression.outputs.passed }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - name: Run display regression attempt
        id: display-regression
        uses: ./.github/actions/run-display-resolution-regression

  ui-display-resolution-regression:
    if: ${{ always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    needs:
      - ui-display-resolution-regression-attempt-1
      - ui-display-resolution-regression-attempt-2
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify at least one display regression attempt passed
        run: |
          set -euo pipefail

          ATTEMPT_1_RESULT="${{ needs.ui-display-resolution-regression-attempt-1.result }}"
          ATTEMPT_1_TEST_STARTED="${{ needs.ui-display-resolution-regression-attempt-1.outputs.test_started }}"
          ATTEMPT_1_PASSED="${{ needs.ui-display-resolution-regression-attempt-1.outputs.passed }}"
          ATTEMPT_2_RESULT="${{ needs.ui-display-resolution-regression-attempt-2.result }}"
          ATTEMPT_2_TEST_STARTED="${{ needs.ui-display-resolution-regression-attempt-2.outputs.test_started }}"
          ATTEMPT_2_PASSED="${{ needs.ui-display-resolution-regression-attempt-2.outputs.passed }}"

          if [ "$ATTEMPT_1_PASSED" = "true" ] || [ "$ATTEMPT_2_PASSED" = "true" ]; then
            echo "Display resolution regression passed."
            exit 0
          fi

          echo "Display resolution regression did not pass in either WarpBuild attempt." >&2
          echo "Attempt 1: result=$ATTEMPT_1_RESULT, test_started=${ATTEMPT_1_TEST_STARTED:-<unset>}, passed=${ATTEMPT_1_PASSED:-<unset>}" >&2
          echo "Attempt 2: result=$ATTEMPT_2_RESULT, test_started=${ATTEMPT_2_TEST_STARTED:-<unset>}, passed=${ATTEMPT_2_PASSED:-<unset>}" >&2
          exit 1
